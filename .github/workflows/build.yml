name: Blindar e Publicar Site

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Permissões necessárias para o deploy
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Injetar Token Secreto no HTML
        run: |
          sed -i "s/__TELEGRAM_TOKEN__/${{ secrets.TELEGRAM_BOT_TOKEN }}/g" index.html

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '🚀 Deploy automático da SaborosaAI'
